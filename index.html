<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e1610">
  <title>Parallel Tangents · UTC Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1610;
      --bg-deep:   #0e0b07;
      --bg-mid:    #140f08;
      --border:    #3a2e1e;
      --border-dim:#2a1e0e;
      --gold:      #f0c84a;
      --gold-lt:   #ffe066;
      --gold-dk:   #c8960a;
      --text:      #d4c4a0;
      --text-dim:  #8a7355;
      --text-muted:#4a3820;
      --text-dark: #6a5030;
      --green:     #6abf69;
    }

    html, body {
      min-height: 100%;
      background: linear-gradient(160deg, #1a1200 0%, #0a0a0a 50%, #0d0a1a 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px 48px;
      font-family: 'IBM Plex Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      background: linear-gradient(180deg, #3a2800 0%, #1a1000 60%, #0e0b07 100%);
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 420px;
      color: var(--text);
      border: 1.5px solid var(--gold);
      position: relative;
      overflow: hidden;
    }
    .shell::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(240,200,74,0.06) 3px, rgba(240,200,74,0.06) 4px);
      pointer-events: none;
      border-radius: 20px;
    }

    .deck-title {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin-bottom: 20px;
      white-space: nowrap;
    }

    /* Tape Window */
    .tape-window {
      background: var(--bg-deep);
      border-radius: 14px;
      border: 2px solid var(--gold);
      padding: 18px 16px 14px;
      margin-bottom: 16px;
      position: relative;
    }
    .tape-window::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 12px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
      pointer-events: none;
    }

    .reels-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 14px;
    }
    .reel-wrap { position: relative; width: 88px; height: 88px; display: flex; align-items: center; justify-content: center; }
    .reel {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: radial-gradient(circle at 50% 50%, #2a1f0e 0%, #1a1208 60%, #0e0b07 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .reel.spinning      { animation: reelSpin 1.8s linear infinite; }
    .reel.spinning-slow { animation: reelSpin 3.5s linear infinite; }
    @keyframes reelSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .reel svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .reel-hub {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #3a2c18;
      border: 1.5px solid var(--gold);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .track-label {
      background: var(--gold);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .label-sub { font-size: 9px; color: #5a3800; letter-spacing: 0.2em; }

    .tape-path {
      height: 6px;
      background: var(--bg-mid);
      border-radius: 3px;
      margin: 0 8px 12px;
      overflow: hidden;
    }
    .tape-sheen {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, rgba(200,168,75,0.15), transparent);
      animation: tapeMove 2s linear infinite;
      animation-play-state: paused;
    }
    .tape-sheen.playing { animation-play-state: running; }
    @keyframes tapeMove { from { transform: translateX(-100%); } to { transform: translateX(400%); } }

    .vu-row {
      display: flex;
      gap: 3px;
      justify-content: center;
      align-items: flex-end;
      height: 32px;
    }
    .vu-bar { width: 5px; border-radius: 2px; background: var(--gold-dk); opacity: 0.2; height: 4px; }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 10px;
      color: var(--gold);
      padding-top: 8px;
      padding-left: 4px;
      padding-right: 4px;
    }

    /* Countdown */
    .countdown-section {
      text-align: center;
      margin-bottom: 20px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .countdown-number {
      font-size: 52px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      font-family: 'IBM Plex Mono', monospace;
    }
    .countdown-number.urgent { color: #e87040; }
    .countdown-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 8px;
    }
    .show-time-display {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* Join button */
    .join-btn {
      display: none;
      background: var(--gold);
      border: none;
      border-radius: 10px;
      color: #1a1000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 14px 32px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }

    /* Host trigger */
    .host-trigger {
      text-align: center;
      margin-top: 16px;
    }
    .host-trigger button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      letter-spacing: 0.15em;
      opacity: 0.35;
      padding: 4px 8px;
    }
    .host-trigger button:hover { opacity: 1; color: var(--gold); }

    /* Host panel */
    .host-panel {
      display: none;
      border-top: 1px solid var(--border-dim);
      padding-top: 14px;
      margin-top: 10px;
    }
    .host-panel.visible { display: block; }
    .host-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-align: center;
    }
    .time-picker-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .time-picker-row label {
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 44px;
    }
    .time-picker-row input[type="datetime-local"] {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 7px 8px;
      outline: none;
    }
    .time-picker-row input:focus { border-color: var(--gold-dk); }
    .set-btn {
      background: var(--gold-dk);
      border: none;
      border-radius: 6px;
      color: #1a1000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 6px;
    }
    .set-btn:hover { background: var(--gold); }
    .host-times-list {
      font-size: 10px;
      color: var(--gold);
      margin-top: 10px;
      line-height: 1.8;
      text-align: center;
    }

    /* PIN overlay */
    .pin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      display: none;
    }
    .pin-overlay.visible { display: flex; }
    .pin-box {
      background: var(--bg);
      border: 1.5px solid var(--gold);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      width: 260px;
    }
    .pin-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }
    .pin-input {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      letter-spacing: 0.4em;
      padding: 10px;
      text-align: center;
      width: 100%;
      outline: none;
      margin-bottom: 8px;
    }
    .pin-cancel {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.1em;
    }
    .pin-error {
      font-size: 10px;
      color: #e87040;
      min-height: 14px;
      margin-top: 4px;
    }

    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(200,168,75,0.95);
      color: #1a1000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="shell">
  <div class="deck-title">Parallel Tangents &middot; UTC Sync</div>

  <!-- Tape window -->
  <div class="tape-window">
    <div class="reels-row">
      <div class="reel-wrap">
        <div class="reel" id="reelL">
          <svg viewBox="0 0 82 82"><g stroke="var(--gold)" stroke-width="1.5" fill="none">
            <circle cx="41" cy="41" r="32"/>
            <circle cx="41" cy="41" r="24"/>
            <circle cx="41" cy="41" r="16"/>
            <circle cx="41" cy="41" r="8"/>
          </g></svg>
          <div class="reel-hub"></div>
        </div>
      </div>
      <div style="text-align:center;flex:1;padding:0 10px;">
        <div class="track-label">
          <div class="label-sub">A &middot; SIDE</div>
        </div>
      </div>
      <div class="reel-wrap">
        <div class="reel" id="reelR">
          <svg viewBox="0 0 82 82"><g stroke="var(--gold)" stroke-width="1.5" fill="none">
            <circle cx="41" cy="41" r="32"/>
            <circle cx="41" cy="41" r="24"/>
            <circle cx="41" cy="41" r="16"/>
            <circle cx="41" cy="41" r="8"/>
          </g></svg>
          <div class="reel-hub"></div>
        </div>
      </div>
    </div>
    <div class="tape-path"><div class="tape-sheen" id="tapeSheen"></div></div>
    <div class="vu-row" id="vuRow"></div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">—</span>
    </div>
  </div>

  <!-- Countdown -->
  <div class="countdown-section">
    <div class="countdown-number" id="countdownNumber">—</div>
    <div class="countdown-label"  id="countdownLabel">loading…</div>
    <div class="show-time-display" id="showTimeDisplay"></div>
  </div>

  <!-- iOS join button -->
  <button class="join-btn" id="joinBtn" onclick="joinNow()">tap to sound</button>

  <!-- Host trigger -->
  <div class="host-trigger">
    <button onclick="showPinOverlay()">· host ·</button>
  </div>

  <!-- Host panel -->
  <div class="host-panel" id="hostPanel">
    <div class="host-label">set show time (your local time)</div>
    <div class="time-picker-row">
      <label>show</label>
      <input type="datetime-local" id="showTime1">
    </div>
    <button class="set-btn" onclick="setShowTimes()">set show time</button>
    <div class="host-times-list" id="hostTimesList"></div>
  </div>
</div>

<!-- PIN overlay -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-box">
    <div class="pin-title">Host Access</div>
    <input class="pin-input" id="pinInput" type="password" maxlength="4" placeholder="····" oninput="checkPin()">
    <div class="pin-error" id="pinError"></div>
    <button class="pin-cancel" onclick="hidePinOverlay()">cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Default show times (fallback if host hasn't set them) ────────────────────
const DEFAULT_SHOW_TIMES = [
  '2026-04-22T23:45:00Z',  // 7:45 PM EST
];
const HOST_PIN = '2257';

// ─── State ────────────────────────────────────────────────────────────────────
const TRACK_URL = 'https://rossalli-cloud.github.io/SYNCParalleltangents/paralleltangentsmixdown1.mp3';

let audio     = null;
let isPlaying = false;
let syncEpoch = null;
let fired     = false;
let syncTimer = null;
let vuTimer   = null;

// Dynamic show times — host can update these
let showTimes = DEFAULT_SHOW_TIMES.map(t => new Date(t).getTime() / 1000);

// ─── Utilities ────────────────────────────────────────────────────────────────
function getUTC() { return Date.now() / 1000; }

function fmt(s) {
  if (!isFinite(s) || s < 0) return '0:00';
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function getNextShowEpoch() {
  const now = getUTC();
  for (const t of showTimes) {
    if (t > now) return t;
  }
  return showTimes[showTimes.length - 1];
}

// ─── Build VU bars ────────────────────────────────────────────────────────────
(function() {
  const row = document.getElementById('vuRow');
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'vu-bar'; b.id = 'vu' + i;
    row.appendChild(b);
  }
})();

function animateVU() {
  for (let i = 0; i < 18; i++) {
    const b = document.getElementById('vu' + i);
    if (!b) continue;
    b.style.height  = (4 + Math.random() * 26) + 'px';
    b.style.opacity = 0.3 + Math.random() * 0.65;
  }
}

function stopVU() {
  clearInterval(vuTimer);
  for (let i = 0; i < 18; i++) {
    const b = document.getElementById('vu' + i);
    if (b) { b.style.height = '4px'; b.style.opacity = '0.2'; }
  }
}

function reelsPlay() {
  document.getElementById('reelL').className = 'reel spinning';
  document.getElementById('reelR').className = 'reel spinning-slow';
  document.getElementById('tapeSheen').classList.add('playing');
}
function reelsStop() {
  document.getElementById('reelL').className = 'reel';
  document.getElementById('reelR').className = 'reel';
  document.getElementById('tapeSheen').classList.remove('playing');
}

// ─── Countdown ────────────────────────────────────────────────────────────────
function updateCountdown() {
  if (fired) return;
  const showEpoch = getNextShowEpoch();
  const left      = showEpoch - getUTC();
  const numEl     = document.getElementById('countdownNumber');
  const labelEl   = document.getElementById('countdownLabel');

  if (left <= 0) {
    fired     = true;
    syncEpoch = showEpoch;
    numEl.textContent   = '▶';
    numEl.className     = 'countdown-number';
    labelEl.textContent = 'sounding now';
    document.getElementById('showTimeDisplay').textContent = '';
    fireSync();
    return;
  }

  const m = Math.floor(left / 60);
  const s = Math.floor(left % 60);
  numEl.textContent = m + ':' + String(s).padStart(2,'0');

  numEl.className   = 'countdown-number' + (left <= 10 ? ' urgent' : '');
  if (left <= 10) {
    labelEl.textContent = '⚡ sounding soon';
    document.getElementById('showTimeDisplay').textContent = '';
  } else {
    labelEl.textContent = 'until show starts';
    document.getElementById('showTimeDisplay').textContent = '';
  }
}

// ─── Fire ─────────────────────────────────────────────────────────────────────
function fireSync() {
  if (!audio) return;
  syncEpoch = getNextShowEpoch();
  // Never try autoplay — always show the tap button so iOS gets a proper gesture
  document.getElementById('countdownNumber').textContent = '▶';
  document.getElementById('countdownLabel').textContent  = 'tap to sound';
  document.getElementById('showTimeDisplay').textContent = '';
  document.getElementById('joinBtn').style.display = 'block';
}

// ─── Tap to sound ─────────────────────────────────────────────────────────────
function joinNow() {
  if (!audio) return;
  audio.currentTime = 0;

  audio.play().then(() => {
    isPlaying = true;
    reelsPlay();
    startSync();
    vuTimer = setInterval(animateVU, 80);
    document.getElementById('countdownNumber').textContent = '▶';
    document.getElementById('countdownLabel').textContent = 'live · in sync';
    document.getElementById('showTimeDisplay').textContent = 'lock & pocket your device';
    document.getElementById('joinBtn').style.display = 'none';
    showToast('🔴 live · in sync');
  }).catch(() => showToast('tap again'));
}

// ─── Drift correction ─────────────────────────────────────────────────────────
function startSync() {
  clearInterval(syncTimer);
  syncTimer = setInterval(() => {
    if (!isPlaying || !syncEpoch || !audio || !audio.duration) return;
    const expected = getUTC() - syncEpoch;
    if (expected >= audio.duration) return; // track should be ending naturally
    const drift = audio.currentTime - expected;
    if (Math.abs(drift) > 1.0) {
      audio.currentTime = Math.min(Math.max(expected, 0), audio.duration - 0.5);
    }
  }, 2000);
}

// ─── Load track ───────────────────────────────────────────────────────────────
function loadTrack(url) {
  audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.preload = 'auto';
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('duration').textContent =
      isFinite(audio.duration) ? fmt(audio.duration) : '—';
  });
  audio.addEventListener('timeupdate', () => {
    document.getElementById('currentTime').textContent = fmt(audio.currentTime);
  });
  audio.addEventListener('ended', () => {
    isPlaying = false;
    clearInterval(syncTimer);
    stopVU();
    reelsStop();
    document.getElementById('countdownNumber').textContent = '—';
    document.getElementById('countdownLabel').textContent  = 'track ended';
  });
  audio.src = url;
  audio.load();
}

// ─── PIN ──────────────────────────────────────────────────────────────────────
function showPinOverlay() {
  document.getElementById('pinOverlay').classList.add('visible');
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function hidePinOverlay() {
  document.getElementById('pinOverlay').classList.remove('visible');
}

function checkPin() {
  const val = document.getElementById('pinInput').value;
  if (val.length < 4) return;
  if (val === HOST_PIN) {
    hidePinOverlay();
    document.getElementById('hostPanel').classList.add('visible');
    updateHostTimesList();
  } else {
    document.getElementById('pinError').textContent = 'incorrect pin';
    document.getElementById('pinInput').value = '';
  }
}

// ─── Host panel ───────────────────────────────────────────────────────────────
function setShowTimes() {
  const t1 = document.getElementById('showTime1').value;
  if (!t1) { showToast('enter a show time'); return; }

  showTimes = [new Date(t1).getTime() / 1000];
  fired     = false;
  syncEpoch = null;

  updateHostTimesList();
  showToast('show time set!');

  document.getElementById('countdownNumber').textContent = '—';
  document.getElementById('countdownLabel').textContent  = 'until show starts';
  document.getElementById('showTimeDisplay').textContent = '';
  setInterval(updateCountdown, 500);
  updateCountdown();
}

function updateHostTimesList() {
  document.getElementById('hostTimesList').innerHTML =
    showTimes.map(t =>
      new Date(t * 1000).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})
    ).join('<br>');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadTrack(TRACK_URL);

if (showTimes.length === 0) {
  document.getElementById('countdownNumber').textContent = '—';
  document.getElementById('countdownLabel').textContent  = 'waiting for host';
  document.getElementById('showTimeDisplay').textContent = '';
} else {
  const nextEpoch = getNextShowEpoch();
  document.getElementById('showTimeDisplay').textContent =
    'show: ' + new Date(nextEpoch * 1000).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});

  if (getUTC() >= nextEpoch) {
    fired     = true;
    syncEpoch = nextEpoch;
    document.getElementById('countdownNumber').textContent = '▶';
    document.getElementById('countdownLabel').textContent  = 'tap to join';
    document.getElementById('showTimeDisplay').textContent = '';
    document.getElementById('joinBtn').style.display = 'block';
  } else {
    setInterval(updateCountdown, 500);
    updateCountdown();
  }
}
</script>
</body>
</html>
